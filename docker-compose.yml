services:
  api:
    image: ${DOCKER_IMAGE_NAME:-triad-api}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: ./backend/ThirdWheel.API
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5127}:5000"
    env_file:
      - ${DOCKER_ENV_FILE:-.env.docker}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - ipv6net

  admin:
    image: ${ADMIN_IMAGE_NAME:-triad-admin}:${ADMIN_IMAGE_TAG:-dev}
    build:
      context: ./admin
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "${ADMIN_PORT:-5173}:80"
    networks:
      - ipv6net

networks:
  ipv6net:
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: "fd00:dead:beef::/48"

volumes:
  api_uploads:
