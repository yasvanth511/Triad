services:
  api:
    image: ${DOCKER_IMAGE_NAME:-triad-api}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: ./backend/ThirdWheel.API
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5127}:5000"
    env_file:
      - ${DOCKER_ENV_FILE:-.env.docker}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - ipv6net

  admin:
    image: ${ADMIN_IMAGE_NAME:-triad-admin}:${ADMIN_IMAGE_TAG:-dev}
    build:
      context: ./admin
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "${ADMIN_PORT:-5173}:80"
    networks:
      - ipv6net

  web:
    image: ${WEB_IMAGE_NAME:-triad-web}:${WEB_IMAGE_TAG:-dev}
    build:
      context: ./web/triad-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ${WEB_PUBLIC_API_ORIGIN:-http://localhost:5127}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_ORIGIN: ${WEB_PUBLIC_API_ORIGIN:-http://localhost:5127}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - ipv6net

  triad-business:
    image: ${BUSINESS_IMAGE_NAME:-triad-business}:${BUSINESS_IMAGE_TAG:-dev}
    build:
      context: ./web/triad-business
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ${BUSINESS_PUBLIC_API_ORIGIN:-http://localhost:5127}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_ORIGIN: ${BUSINESS_PUBLIC_API_ORIGIN:-http://localhost:5127}
      PORT: 3002
      HOSTNAME: 0.0.0.0
    ports:
      - "${BUSINESS_PORT:-3002}:3002"
    networks:
      - ipv6net

networks:
  ipv6net:
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: "fd00:dead:beef::/48"

volumes:
  api_uploads:
