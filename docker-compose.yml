services:
  triad-backend:
    container_name: triad-backend
    image: ${DOCKER_IMAGE_NAME:-triad-backend}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: ./backend/ThirdWheel.API
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5127}:5000"
    env_file:
      - ${DOCKER_ENV_FILE:-.env.docker}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - ipv6net

  triad-admin:
    container_name: triad-admin
    image: ${ADMIN_IMAGE_NAME:-triad-admin}:${ADMIN_IMAGE_TAG:-dev}
    build:
      context: ./admin
      dockerfile: Dockerfile
    depends_on:
      - triad-backend
    environment:
      Admin__ApiBaseUrl: ${ADMIN_API_BASE_URL:-http://triad-backend:5000}
    ports:
      - "${ADMIN_PORT:-5173}:80"
    networks:
      - ipv6net

  triad-web:
    container_name: triad-web
    image: ${WEB_IMAGE_NAME:-triad-web}:${WEB_IMAGE_TAG:-dev}
    build:
      context: ./web/triad-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ${WEB_PUBLIC_API_ORIGIN:-http://localhost:5127}
    depends_on:
      - triad-backend
    environment:
      NEXT_PUBLIC_API_ORIGIN: ${WEB_PUBLIC_API_ORIGIN:-http://localhost:5127}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - ipv6net

  triad-business:
    container_name: triad-business
    image: ${BUSINESS_IMAGE_NAME:-triad-business}:${BUSINESS_IMAGE_TAG:-dev}
    build:
      context: ./web/triad-business
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ${BUSINESS_PUBLIC_API_ORIGIN:-http://localhost:5127}
    depends_on:
      - triad-backend
    environment:
      NEXT_PUBLIC_API_ORIGIN: ${BUSINESS_PUBLIC_API_ORIGIN:-http://localhost:5127}
      PORT: 3002
      HOSTNAME: 0.0.0.0
    ports:
      - "${BUSINESS_PORT:-3002}:3002"
    networks:
      - ipv6net

  triad-marketing:
    container_name: triad-marketing
    image: ${SITE_IMAGE_NAME:-triad-marketing}:${SITE_IMAGE_TAG:-dev}
    build:
      context: ./web/triad-site
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TRIAD_WEB_APP_URL: ${SITE_PUBLIC_TRIAD_WEB_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_TRIAD_BUSINESS_APP_URL: ${SITE_PUBLIC_TRIAD_BUSINESS_APP_URL:-http://localhost:3002}
        NEXT_PUBLIC_APP_STORE_URL: ${SITE_PUBLIC_APP_STORE_URL:-}
        NEXT_PUBLIC_GOOGLE_PLAY_URL: ${SITE_PUBLIC_GOOGLE_PLAY_URL:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${SITE_PUBLIC_CONTACT_EMAIL:-hello@triad.app}
    environment:
      NEXT_PUBLIC_TRIAD_WEB_APP_URL: ${SITE_PUBLIC_TRIAD_WEB_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_TRIAD_BUSINESS_APP_URL: ${SITE_PUBLIC_TRIAD_BUSINESS_APP_URL:-http://localhost:3002}
      NEXT_PUBLIC_APP_STORE_URL: ${SITE_PUBLIC_APP_STORE_URL:-}
      NEXT_PUBLIC_GOOGLE_PLAY_URL: ${SITE_PUBLIC_GOOGLE_PLAY_URL:-}
      NEXT_PUBLIC_CONTACT_EMAIL: ${SITE_PUBLIC_CONTACT_EMAIL:-hello@triad.app}
      PORT: 3003
      HOSTNAME: 0.0.0.0
    ports:
      - "${SITE_PORT:-3003}:3003"
    networks:
      - ipv6net

networks:
  ipv6net:
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: "fd00:dead:beef::/48"

volumes:
  api_uploads:
